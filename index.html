<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Breakout Tracker</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <style>
        body {
            background: #0b1220;
        }

        .glass {
            background: rgba(255, 255, 255, .06);
            border: 1px solid rgba(255, 255, 255, .12);
        }

        .text-muted-2 {
            color: rgba(255, 255, 255, .65) !important;
        }

        .table thead th {
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }
    </style>
</head>

<body class="text-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark glass sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-semibold" href="#/dashboard">Breakout Tracker</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMain">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a id="nav-dashboard" class="nav-link active" href="#/dashboard">Dashboard</a>
                    </li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            Categories
                        </a>
                        <ul class="dropdown-menu dropdown-menu-dark" id="categories-menu">
                            <li><span class="dropdown-item-text text-muted">Loading…</span></li>
                        </ul>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-2">
                    <div id="meta" class="small text-muted-2 text-truncate" style="max-width: 55vw;">Loading…</div>
                    <button id="btn-refresh" class="btn btn-sm btn-outline-light">Refresh</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container py-4">

        <!-- DASHBOARD VIEW -->
        <section id="view-dashboard" class="view active">
            <div class="row g-3">
                <!-- Pie -->
                <div class="col-12 col-lg-6">
                    <div class="card glass text-light">
                        <div class="card-body">
                            <div class="d-flex align-items-center justify-content-between mb-2">
                                <h5 class="card-title mb-0">Breakout chances</h5>
                                <span id="pie-hint" class="small text-muted-2"></span>
                            </div>
                            <div style="height: 320px;">
                                <canvas id="pie"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Breakout table -->
                <div class="col-12 col-lg-6">
                    <div class="card glass text-light">
                        <div class="card-body">
                            <div
                                class="d-flex flex-column flex-md-row gap-2 align-items-md-center justify-content-between mb-2">
                                <h5 class="card-title mb-0">Stocks with breakout chances</h5>

                                <div class="d-flex flex-column flex-md-row gap-2">
                                    <!-- NEW: Category filter -->
                                    <select id="dash-category" class="form-select form-select-sm"
                                        style="min-width: 260px;">
                                        <option value="__ALL__">All categories</option>
                                    </select>

                                    <!-- <input id="dash-filter" class="form-control form-control-sm"
                                        style="max-width: 340px;"
                                        placeholder="Filter (symbol / group / CPR / pChange)…" /> -->
                                </div>
                            </div>

                            <div class="table-responsive" style="max-height: 420px;">
                                <table class="table table-dark table-hover align-middle mb-0">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>Symbol</th>
                                            <th>Categories</th>
                                            <th>Groups</th>
                                            <th class="text-end">Links</th>
                                        </tr>
                                    </thead>
                                    <tbody id="dash-rows"></tbody>
                                </table>
                            </div>

                            <div id="dash-status" class="small text-muted-2 mt-2"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- CATEGORY VIEW -->
        <section id="view-category" class="view">
            <div class="card glass text-light">
                <div class="card-body">
                    <div
                        class="d-flex flex-column flex-lg-row gap-2 align-items-lg-center justify-content-between mb-2">
                        <div>
                            <h5 class="card-title mb-0" id="cat-title">Category</h5>
                            <div class="small text-muted-2" id="cat-subtitle"></div>
                        </div>

                        <div class="d-flex flex-column flex-md-row gap-2">
                            <!-- NEW: Group dropdown -->
                            <select id="group-select" class="form-select form-select-sm"
                                style="min-width: 260px;"></select>

                            <input id="cat-filter" class="form-control form-control-sm" style="max-width: 340px;"
                                placeholder="Filter in this group…" />
                        </div>
                    </div>

                    <div class="table-responsive" style="max-height: 70vh;">
                        <table class="table table-dark table-hover align-middle mb-0">
                            <thead id="cat-thead" class="table-dark"></thead>
                            <tbody id="cat-rows"></tbody>
                        </table>
                    </div>

                    <div id="cat-status" class="small text-muted-2 mt-2"></div>
                </div>
            </div>
        </section>

        <!-- ERROR VIEW -->
        <section id="view-error" class="view">
            <div class="alert alert-danger">
                <div class="fw-semibold mb-2">Error</div>
                <pre id="error-text" class="mb-0"></pre>
            </div>
        </section>

    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
